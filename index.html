<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lil.audio</title>
  <style>
    @font-face {
      font-family: 'ComicSans';
      src: url('fonts/comic-sans-bold.woff2') format('woff2');
      font-weight: bold;
      font-style: normal;
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: 'ComicSans', 'Comic Sans MS', cursive;
      cursor: pointer;
    }
    .logo {
      font-size: clamp(120px, 25vw, 280px);
      font-weight: bold;
      letter-spacing: 0.02em;
      line-height: 1;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="logo"><span id="l1">l</span><span id="i">i</span><span id="l2">l</span></div>
  <script>
    const colors = [
      '#FF3B30', '#FF8C42', '#FFD60A', '#30D158',
      '#0A84FF', '#5E5CE6', '#FF375F', '#4ECDC4',
      '#AF52DE', '#FF6B6B', '#00C7BE', '#FF9500'
    ];

    function pick() {
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function randomize() {
      document.getElementById('l1').style.color = pick();
      document.getElementById('i').style.color = pick();
      document.getElementById('l2').style.color = pick();
    }

    randomize();
    document.body.addEventListener('click', randomize);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>lil.audio</title>
  <script src="https://cdn.jsdelivr.net/npm/tone@15.1.22/build/Tone.min.js"></script>
  <style>
    @font-face {
      font-family: 'ComicSans';
      src: url('../fonts/comic-sans-bold.woff2') format('woff2');
      font-weight: bold;
      font-style: normal;
      font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'ComicSans', 'Comic Sans MS', cursive;
      overflow: hidden;
      touch-action: none;
      transition: background-color 1.5s ease;
      background-color: #1a1a2e;
    }

    /* ─── Password ─── */
    #gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    #gate .logo { font-size: 60px; font-weight: bold; color: #fff; }
    #gate input {
      font-family: 'ComicSans', 'Comic Sans MS', cursive;
      font-size: 20px;
      padding: 12px 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      text-align: center;
      outline: none;
      background: transparent;
      color: #fff;
      letter-spacing: 0.1em;
    }
    #gate input::placeholder { color: rgba(255,255,255,0.2); }
    #gate .hint { font-size: 14px; opacity: 0.2; color: #fff; }
    #gate.wrong input { border-color: #FF3B30; animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* ─── Main App ─── */
    #app {
      display: none;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      position: relative;
    }

    /* ─── XY Field ─── */
    #field {
      position: absolute;
      inset: 0;
      cursor: crosshair;
    }

    /* Corner labels */
    .corner-label {
      position: absolute;
      font-size: clamp(11px, 2.5vw, 16px);
      font-weight: bold;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.15;
      transition: opacity 0.8s, color 1.5s;
      pointer-events: none;
    }
    .corner-label.tl { top: 5vh; left: 5vw; }
    .corner-label.tr { top: 5vh; right: 5vw; text-align: right; }
    .corner-label.bl { bottom: 5vh; left: 5vw; }
    .corner-label.br { bottom: 5vh; right: 5vw; text-align: right; }

    /* The ball/cursor */
    #ball {
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-shadow: 0 0 30px rgba(255,255,255,0.15);
      transition: background-color 0.8s ease, box-shadow 0.8s ease;
      z-index: 10;
    }

    /* Glow trail */
    #ball::after {
      content: '';
      position: absolute;
      inset: -15px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Logo */
    #app-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(60px, 15vw, 120px);
      font-weight: bold;
      opacity: 0.06;
      pointer-events: none;
      z-index: 1;
      transition: color 1.5s;
    }

    /* Start prompt */
    #start-prompt {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(16px, 3.5vw, 24px);
      font-weight: bold;
      opacity: 0.5;
      animation: pulse 2s ease-in-out infinite;
      cursor: pointer;
      z-index: 20;
      transition: color 1.5s;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.5; }
      50% { opacity: 0.15; }
    }

    /* Grid lines */
    #grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    #grid .line {
      position: absolute;
      background: currentColor;
      opacity: 0.04;
    }
    #grid .h { left: 0; right: 0; height: 1px; top: 50%; }
    #grid .v { top: 0; bottom: 0; width: 1px; left: 50%; }

    /* Version */
    #version {
      position: absolute;
      bottom: 2vh;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      opacity: 0.1;
      pointer-events: none;
      transition: color 1.5s;
    }
  </style>
</head>
<body>

  <div id="gate">
    <div class="logo">lil</div>
    <input id="pw" type="password" placeholder="•••••••" autofocus>
    <div class="hint">v0.1</div>
  </div>

  <div id="app">
    <div id="grid">
      <div class="line h"></div>
      <div class="line v"></div>
    </div>

    <div id="app-logo">lil</div>

    <div class="corner-label tl" id="lbl-tl">sing · play</div>
    <div class="corner-label tr" id="lbl-tr">float · play</div>
    <div class="corner-label bl" id="lbl-bl">sing · sleep</div>
    <div class="corner-label br" id="lbl-br">float · sleep</div>

    <div id="field">
      <div id="start-prompt">tap anywhere</div>
    </div>

    <div id="ball"></div>
    <div id="version">lil.audio v0.1</div>
  </div>

<script>
// ─── PASSWORD ───
const PASS = 'bambient';
const pwInput = document.getElementById('pw');
const gate = document.getElementById('gate');
const appEl = document.getElementById('app');

pwInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (pwInput.value === PASS) {
      gate.style.display = 'none';
      appEl.style.display = 'block';
      initApp();
    } else {
      gate.classList.add('wrong');
      pwInput.value = '';
      setTimeout(() => gate.classList.remove('wrong'), 400);
    }
  }
});

// ─── STATE ───
// x: 0 = melodic, 1 = ambient
// y: 0 = sleep (bottom), 1 = play (top)
let xVal = 0.5;
let yVal = 0.5;
let audioStarted = false;
let isDragging = false;

// ─── COLORS ───
function lerpColor(a, b, t) {
  const ah = parseInt(a.replace('#',''), 16);
  const bh = parseInt(b.replace('#',''), 16);
  const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
  const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
  return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
}

// Corner colors: TL(melodic+play) TR(ambient+play) BL(melodic+sleep) BR(ambient+sleep)
const C_TL = '#FFD60A'; // warm yellow
const C_TR = '#4ECDC4'; // teal
const C_BL = '#FF6B6B'; // coral
const C_BR = '#5E5CE6'; // deep purple

function bilinear(tl, tr, bl, br, x, y) {
  // x: 0=left, 1=right. y: 0=bottom, 1=top
  const top = lerpColor(tl, tr, x);
  const bot = lerpColor(bl, br, x);
  return lerpColor(bot, top, y);
}

function bilinearHex(tl, tr, bl, br, x, y) {
  const parse = c => {
    const h = parseInt(c.replace('#',''), 16);
    return [(h >> 16) & 0xff, (h >> 8) & 0xff, h & 0xff];
  };
  const lerp3 = (a, b, t) => a.map((v, i) => Math.round(v + (b[i] - v) * t));
  const top = lerp3(parse(tl), parse(tr), x);
  const bot = lerp3(parse(bl), parse(br), x);
  const c = lerp3(bot, top, y);
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

function updateVisuals() {
  const x = xVal, y = yVal;

  // Background: gets darker toward sleep, lighter toward play
  const bgSleep = bilinearHex('#080810', '#060a14', '#080810', '#060a14', x, 0);
  const bgPlay = bilinearHex('#FFF8E0', '#E8F8F8', '#FFF8E0', '#E8F8F8', x, 0);
  document.body.style.backgroundColor = lerpColor(bgSleep, bgPlay, y);

  // Ball color
  const ballColor = bilinearHex(C_TL, C_TR, C_BL, C_BR, x, y);
  const ball = document.getElementById('ball');
  ball.style.backgroundColor = ballColor;
  ball.style.boxShadow = `0 0 ${20 + (1 - y) * 40}px ${ballColor}77`;

  // Position ball
  const fieldRect = document.getElementById('field').getBoundingClientRect();
  ball.style.left = (fieldRect.left + x * fieldRect.width) + 'px';
  ball.style.top = (fieldRect.top + (1 - y) * fieldRect.height) + 'px';

  // Text: bright white in sleep (dark bg), dark in play (light bg)
  const textColor = lerpColor('#ffffff', '#1a1a2e', y);
  document.querySelectorAll('.corner-label').forEach(el => el.style.color = textColor);
  document.getElementById('app-logo').style.color = textColor;
  document.getElementById('version').style.color = textColor;
  document.querySelectorAll('#grid .line').forEach(el => el.style.color = textColor);
  const prompt = document.getElementById('start-prompt');
  if (prompt) prompt.style.color = textColor;

  // Labels: brighter in sleep, dimmer in play
  const baseLabelOpacity = lerp(0.35, 0.08, y);
  document.querySelectorAll('.corner-label').forEach(el => el.style.opacity = baseLabelOpacity);
  const nearest = x < 0.5 ? (y > 0.5 ? 'tl' : 'bl') : (y > 0.5 ? 'tr' : 'br');
  const dist = Math.sqrt(Math.pow(x < 0.5 ? x : 1 - x, 2) + Math.pow(y > 0.5 ? 1 - y : y, 2));
  document.getElementById('lbl-' + nearest).style.opacity = baseLabelOpacity + (1 - dist) * 0.35;
}

// ─── INTERACTION ───
function initApp() {
  updateVisuals();

  const field = document.getElementById('field');
  const prompt = document.getElementById('start-prompt');

  function getXY(e) {
    const rect = field.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: Math.max(0, Math.min(1, (cx - rect.left) / rect.width)),
      y: Math.max(0, Math.min(1, 1 - (cy - rect.top) / rect.height))
    };
  }

  function onStart(e) {
    e.preventDefault();
    if (!audioStarted) {
      startAudio();
      audioStarted = true;
      prompt.style.display = 'none';
    }
    isDragging = true;
    onMove(e);
  }

  function onMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    const pos = getXY(e);
    xVal = pos.x;
    yVal = pos.y;
    updateVisuals();
    updateAudio();
  }

  function onEnd() { isDragging = false; }

  field.addEventListener('mousedown', onStart);
  field.addEventListener('touchstart', onStart, { passive: false });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchend', onEnd);
}

// ─── AUDIO ENGINE ───
let melodySynth, bellSynth, padSynth, bassSynth, noiseSynth, clickSynth;
let melodyLoop, bellLoop, rhythmLoop, driftTimeout;
let masterReverb, masterDelay, masterFilter, masterGain;
let currentChordIndex = 0;

const PENTATONIC = [0, 2, 4, 7, 9];
const MAJOR = [0, 2, 4, 5, 7, 9, 11];
const DORIAN = [0, 2, 3, 5, 7, 9, 10];

const BRIGHT_CHORDS = [
  [60, 64, 67],    // C
  [65, 69, 72],    // F
  [67, 71, 74],    // G
  [57, 60, 64],    // Am
];
const DREAM_CHORDS = [
  [60, 64, 67, 71], // Cmaj7
  [65, 69, 72, 76], // Fmaj7
  [57, 60, 64, 67], // Am7
  [55, 59, 62, 66], // Gmaj7/low
  [62, 65, 69, 72], // Dm7
];

function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }
function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
function lerp(a, b, t) { return a + (b - a) * t; }

function startAudio() {
  Tone.start();

  // ─── FX Chain ───
  masterReverb = new Tone.Reverb({ decay: 4, wet: 0.3 }).toDestination();
  masterDelay = new Tone.FeedbackDelay({ delayTime: '8n.', feedback: 0.15, wet: 0.1 }).connect(masterReverb);
  masterFilter = new Tone.Filter({ frequency: 5000, type: 'lowpass', rolloff: -12 }).connect(masterDelay);
  masterGain = new Tone.Gain(0.65).connect(masterFilter);

  // ─── MELODY (music box / bell) ───
  melodySynth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'custom', partials: [1, 0.6, 0.3, 0.1, 0.05] },
    envelope: { attack: 0.003, decay: 1.0, sustain: 0.05, release: 2 },
    volume: -8,
  }).connect(masterGain);

  // ─── BELL (high chimes) ───
  bellSynth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'sine' },
    envelope: { attack: 0.001, decay: 2, sustain: 0, release: 3 },
    volume: -16,
  }).connect(masterGain);

  // ─── PAD (drones) ───
  padSynth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'sine' },
    envelope: { attack: 4, decay: 3, sustain: 0.7, release: 6 },
    volume: -18,
  }).connect(masterGain);

  // ─── BASS ───
  bassSynth = new Tone.Synth({
    oscillator: { type: 'triangle' },
    envelope: { attack: 0.8, decay: 1.5, sustain: 0.5, release: 4 },
    volume: -20,
  }).connect(masterGain);

  // ─── CLICK (soft rhythm) ───
  clickSynth = new Tone.MembraneSynth({
    pitchDecay: 0.01,
    octaves: 2,
    envelope: { attack: 0.001, decay: 0.15, sustain: 0, release: 0.1 },
    volume: -24,
  }).connect(masterGain);

  // ─── NOISE ───
  const noiseFilter = new Tone.Filter({ frequency: 600, type: 'lowpass' }).connect(masterGain);
  noiseSynth = new Tone.Noise({ type: 'pink', volume: -32 }).connect(noiseFilter);
  noiseSynth.start();

  // ─── MELODY SEQUENCER ───
  let lastMelodyNote = -1;
  let melodyHistory = [];

  melodyLoop = new Tone.Loop(time => {
    const x = xVal; // 0=melodic, 1=ambient
    const y = yVal; // 0=sleep, 1=play

    // Note probability: high when melodic, lower when ambient
    const noteProb = lerp(0.8, 0.15, x) * lerp(0.4, 1.0, y);
    if (Math.random() > noteProb) return;

    // Scale: pentatonic for melodic, wider for ambient
    const scale = x < 0.4 ? PENTATONIC : (x < 0.7 ? MAJOR : DORIAN);

    // Register: higher in play, lower in sleep
    const baseNote = Math.round(lerp(60, 72, y) + (Math.random() - 0.5) * lerp(5, 14, x));
    const interval = pick(scale);
    const note = baseNote + interval;

    // Avoid repeating same note too much
    if (note === lastMelodyNote && Math.random() > 0.3) return;
    lastMelodyNote = note;

    // Duration: short and snappy when melodic+play, longer when ambient/sleep
    const dur = lerp(0.08, 0.6, x * 0.5 + (1 - y) * 0.5);

    // Velocity
    const vel = lerp(0.25, 0.55, y) * lerp(1.0, 0.5, x);

    melodySynth.triggerAttackRelease(midiToFreq(note), dur, time, vel);

    // Occasionally double-strike for music box feel when melodic
    if (x < 0.3 && Math.random() > 0.7) {
      const harm = note + pick([12, 7, 5]);
      melodySynth.triggerAttackRelease(midiToFreq(harm), dur * 0.5, time + 0.05, vel * 0.4);
    }
  }, '8n');

  // ─── BELL / CHIME LOOP ───
  bellLoop = new Tone.Loop(time => {
    const x = xVal, y = yVal;
    // More bells in ambient mode
    const prob = lerp(0.15, 0.45, x) * lerp(0.6, 1.0, 1 - y * 0.3);
    if (Math.random() > prob) return;

    const interval = pick(PENTATONIC);
    const octave = lerp(84, 90, x) + Math.floor(Math.random() * 7);
    const note = midiToFreq(octave + interval);
    const vel = lerp(0.08, 0.2, x) * lerp(0.5, 1.0, 1 - y * 0.5);
    bellSynth.triggerAttackRelease(note, 0.03, time, vel);
  }, '4n');

  // ─── RHYTHM ───
  let rStep = 0;
  rhythmLoop = new Tone.Loop(time => {
    const x = xVal, y = yVal;
    rStep++;

    // Rhythm only present when y > 0.3 and x < 0.7
    const rhythmAmount = Math.max(0, (y - 0.25) / 0.75) * Math.max(0, (0.8 - x) / 0.8);
    if (rhythmAmount < 0.05) return;

    const is4 = rStep % 4 === 0;
    const is8 = rStep % 2 === 0;

    if (is4 || (is8 && rhythmAmount > 0.4) || (rhythmAmount > 0.7 && Math.random() > 0.6)) {
      const pitch = is4 ? 60 : 80;
      clickSynth.triggerAttackRelease(pitch, '32n', time, 0.3 * rhythmAmount);
    }
  }, '16n');

  // ─── CHORD DRIFT ───
  function playChord() {
    const x = xVal, y = yVal;

    // Choose chord set based on position
    const chords = x > 0.5 ? DREAM_CHORDS : BRIGHT_CHORDS;
    currentChordIndex = (currentChordIndex + 1) % chords.length;

    // Occasionally skip a change for variety
    if (Math.random() > 0.8) currentChordIndex = Math.floor(Math.random() * chords.length);

    const chord = chords[currentChordIndex];

    padSynth.releaseAll();
    bassSynth.triggerRelease();

    // Pad: louder in ambient/sleep
    const padVol = lerp(0.15, 0.5, x) * lerp(0.8, 0.4, y);
    padSynth.triggerAttack(chord.map(midiToFreq), Tone.now(), padVol);

    // Bass
    const bassVol = lerp(0.3, 0.5, 1 - y);
    bassSynth.triggerAttack(midiToFreq(chord[0] - 12), Tone.now(), bassVol);
  }

  function scheduleChord() {
    const interval = lerp(8000, 4000, yVal) + lerp(0, 6000, xVal) + Math.random() * 3000;
    playChord();
    driftTimeout = setTimeout(scheduleChord, interval);
  }

  // ─── START ───
  Tone.getTransport().bpm.value = 90;
  Tone.getTransport().start();
  melodyLoop.start(0);
  bellLoop.start(0);
  rhythmLoop.start(0);
  scheduleChord();
  updateAudio();
}

function updateAudio() {
  if (!audioStarted) return;
  const x = xVal, y = yVal;

  // BPM: sleep=55, play=115, ambient slows a bit
  Tone.getTransport().bpm.rampTo(lerp(55, 115, y) * lerp(1.0, 0.8, x), 2);

  // Reverb: ambient+sleep = very wet, melodic+play = drier
  masterReverb.wet.rampTo(lerp(0.15, 0.6, x) + lerp(0.2, 0, y), 2);

  // Delay: more in ambient
  masterDelay.wet.rampTo(lerp(0.05, 0.3, x), 1.5);
  masterDelay.feedback.rampTo(lerp(0.1, 0.35, x), 1.5);

  // Filter: bright in play, dark in sleep; ambient slightly darker
  const filterFreq = lerp(800, 8000, y) * lerp(1.0, 0.7, x);
  masterFilter.frequency.rampTo(filterFreq, 1);

  // Melody volume: loud in melodic, quiet in ambient
  melodySynth.volume.rampTo(lerp(-6, -20, x), 1);

  // Melody envelope: snappy in play, longer in sleep
  // (Can't easily ramp envelope but we handle this in the loop)

  // Bell: more present in ambient
  bellSynth.volume.rampTo(lerp(-20, -12, x), 1);

  // Pad: louder in ambient+sleep
  padSynth.volume.rampTo(lerp(-22, -12, x) + lerp(3, 0, y), 2);

  // Bass
  bassSynth.volume.rampTo(lerp(-22, -16, 1 - y), 2);

  // Noise: more in sleep, more in ambient
  noiseSynth.volume.rampTo(-36 + (1 - y) * 8 + x * 4, 2);

  // Click: quiet in ambient
  clickSynth.volume.rampTo(lerp(-20, -30, x), 1);

  // Loop intervals adapt
  melodyLoop.interval = y > 0.5 ? '8n' : (y > 0.25 ? '4n' : '2n');
  bellLoop.interval = y > 0.5 ? '4n' : '2n';
}

</script>
</body>
</html>

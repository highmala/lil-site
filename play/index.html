<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>lil.audio</title>
  <script src="https://cdn.jsdelivr.net/npm/tone@15.1.22/build/Tone.min.js"></script>
  <style>
    @font-face {
      font-family: 'ComicSans';
      src: url('../fonts/comic-sans-bold.woff2') format('woff2');
      font-weight: bold;
      font-style: normal;
      font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'ComicSans', 'Comic Sans MS', cursive;
      overflow: hidden;
      touch-action: none;
      transition: background-color 1.5s ease;
      background-color: #1a1a2e;
    }

    /* ─── Password ─── */
    #gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    #gate .logo { font-size: 60px; font-weight: bold; color: #fff; }
    #gate input {
      font-family: 'ComicSans', 'Comic Sans MS', cursive;
      font-size: 20px;
      padding: 12px 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      text-align: center;
      outline: none;
      background: transparent;
      color: #fff;
      letter-spacing: 0.1em;
    }
    #gate input::placeholder { color: rgba(255,255,255,0.2); }
    #gate .hint { font-size: 14px; opacity: 0.2; color: #fff; }
    #gate.wrong input { border-color: #FF3B30; animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* ─── Main App ─── */
    #app {
      display: none;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      position: relative;
    }

    /* ─── XY Field ─── */
    #field {
      position: absolute;
      inset: 0;
      cursor: crosshair;
    }

    /* Corner labels */
    .corner-label {
      position: absolute;
      font-size: clamp(11px, 2.5vw, 16px);
      font-weight: bold;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.15;
      transition: opacity 0.8s, color 1.5s;
      pointer-events: none;
    }
    .corner-label.tl { top: 5vh; left: 5vw; }
    .corner-label.tr { top: 5vh; right: 5vw; text-align: right; }
    .corner-label.bl { bottom: 5vh; left: 5vw; }
    .corner-label.br { bottom: 5vh; right: 5vw; text-align: right; }

    /* The ball/cursor */
    #ball {
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-shadow: 0 0 30px rgba(255,255,255,0.15);
      transition: background-color 0.8s ease, box-shadow 0.8s ease;
      z-index: 10;
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1.12); opacity: 0.85; }
    }

    /* Glow trail */
    #ball::after {
      content: '';
      position: absolute;
      inset: -15px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Logo */
    #app-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(60px, 15vw, 120px);
      font-weight: bold;
      opacity: 0.06;
      pointer-events: none;
      z-index: 1;
      transition: color 1.5s;
    }

    /* Start prompt */
    #start-prompt {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(16px, 3.5vw, 24px);
      font-weight: bold;
      opacity: 0.5;
      animation: pulse 2s ease-in-out infinite;
      cursor: pointer;
      z-index: 20;
      transition: color 1.5s;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.5; }
      50% { opacity: 0.15; }
    }

    /* Grid lines */
    #grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    #grid .line {
      position: absolute;
      background: currentColor;
      opacity: 0.04;
    }
    #grid .h { left: 0; right: 0; height: 1px; top: 50%; }
    #grid .v { top: 0; bottom: 0; width: 1px; left: 50%; }

    /* Mute button */
    #mute-btn {
      position: absolute;
      bottom: 5vh;
      left: 50%;
      transform: translateX(-50%);
      border: none;
      background: none;
      font-family: 'ComicSans', 'Comic Sans MS', cursive;
      font-size: clamp(12px, 2.5vw, 16px);
      font-weight: bold;
      letter-spacing: 0.1em;
      cursor: pointer;
      z-index: 20;
      display: none;
      opacity: 0.25;
      transition: opacity 0.3s, color 1.5s;
    }
    #mute-btn:hover { opacity: 0.5; }

    /* Version */
    #version {
      position: absolute;
      bottom: 2vh;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      opacity: 0.1;
      pointer-events: none;
      transition: color 1.5s;
    }
  </style>
</head>
<body>

  <div id="gate">
    <div class="logo">lil</div>
    <input id="pw" type="password" placeholder="•••••••" autofocus>
    <div class="hint">v0.1</div>
  </div>

  <div id="app">
    <div id="grid">
      <div class="line h"></div>
      <div class="line v"></div>
    </div>

    <div id="app-logo">lil</div>

    <div class="corner-label tl" id="lbl-tl">hum · play</div>
    <div class="corner-label tr" id="lbl-tr">glow · play</div>
    <div class="corner-label bl" id="lbl-bl">hum · sleep</div>
    <div class="corner-label br" id="lbl-br">glow · sleep</div>

    <div id="field">
      <div id="start-prompt">tap anywhere</div>
    </div>

    <div id="ball"></div>
    <button id="mute-btn">mute</button>
    <div id="version">lil.audio v0.1</div>
  </div>

<script>
// ─── PASSWORD ───
const PASS = 'bambient';
const pwInput = document.getElementById('pw');
const gate = document.getElementById('gate');
const appEl = document.getElementById('app');

pwInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (pwInput.value === PASS) {
      gate.style.display = 'none';
      appEl.style.display = 'block';
      initApp();
    } else {
      gate.classList.add('wrong');
      pwInput.value = '';
      setTimeout(() => gate.classList.remove('wrong'), 400);
    }
  }
});

// ─── STATE ───
// x: 0 = hum, 1 = glow
// y: 0 = sleep (bottom), 1 = play (top)
let xVal = 0.5;      // current (smoothed)
let yVal = 0.5;
let xTarget = 0.5;   // target (where user clicked/dragged)
let yTarget = 0.5;
let audioStarted = false;
let appReady = false;
let isDragging = false;
const GLIDE_SPEED = 0.02; // ~3-4 seconds to reach target

// Smooth glide loop — only runs after app is initialized
(function glideLoop() {
  if (appReady) {
    xVal += (xTarget - xVal) * GLIDE_SPEED;
    yVal += (yTarget - yVal) * GLIDE_SPEED;
    if (audioStarted) updateAudio();
    updateVisuals();
  }
  requestAnimationFrame(glideLoop);
})();

// ─── COLORS ───
function lerpColor(a, b, t) {
  const ah = parseInt(a.replace('#',''), 16);
  const bh = parseInt(b.replace('#',''), 16);
  const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
  const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
  return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
}

// Corner colors: TL(melodic+play) TR(ambient+play) BL(melodic+sleep) BR(ambient+sleep)
const C_TL = '#FFD60A'; // warm yellow
const C_TR = '#4ECDC4'; // teal
const C_BL = '#FF6B6B'; // coral
const C_BR = '#5E5CE6'; // deep purple

function bilinear(tl, tr, bl, br, x, y) {
  // x: 0=left, 1=right. y: 0=bottom, 1=top
  const top = lerpColor(tl, tr, x);
  const bot = lerpColor(bl, br, x);
  return lerpColor(bot, top, y);
}

function bilinearHex(tl, tr, bl, br, x, y) {
  const parse = c => {
    const h = parseInt(c.replace('#',''), 16);
    return [(h >> 16) & 0xff, (h >> 8) & 0xff, h & 0xff];
  };
  const lerp3 = (a, b, t) => a.map((v, i) => Math.round(v + (b[i] - v) * t));
  const top = lerp3(parse(tl), parse(tr), x);
  const bot = lerp3(parse(bl), parse(br), x);
  const c = lerp3(bot, top, y);
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

function updateVisuals() {
  const x = xVal, y = yVal;

  // Background: deep black at sleep, bright shifting colors at play
  const bgSleep = bilinearHex('#080810', '#060a14', '#080810', '#060a14', x, 0);
  // Play side: vivid colors that shift with x position
  const time01 = (Date.now() % 20000) / 20000; // slow 20s cycle
  const hue = ((x * 60) + (time01 * 360)) % 360; // shifts with position + time
  const sat = lerp(70, 50, x);
  const lit = lerp(88, 92, x);
  const playBg = `hsl(${hue}, ${sat}%, ${lit}%)`;
  // For lerp we need hex fallback — use bilinear for structure, HSL for play end
  if (y > 0.5) {
    const t = (y - 0.5) * 2; // 0 to 1 in top half
    document.body.style.backgroundColor = playBg;
    document.body.style.opacity = 1;
    // Blend: below 0.5 is hex dark, above is HSL bright
    const darkHex = bilinearHex('#080810', '#060a14', '#080810', '#060a14', x, 0);
    document.body.style.background = `color-mix(in srgb, ${darkHex} ${Math.round((1-t)*100)}%, ${playBg} ${Math.round(t*100)}%)`;
  } else {
    document.body.style.backgroundColor = lerpColor(bgSleep, '#333340', y * 2);
  }

  // Ball color
  const ballColor = bilinearHex(C_TL, C_TR, C_BL, C_BR, x, y);
  const ball = document.getElementById('ball');
  ball.style.backgroundColor = ballColor;
  ball.style.boxShadow = `0 0 ${20 + (1 - y) * 40}px ${ballColor}77`;

  // Position ball
  const fieldRect = document.getElementById('field').getBoundingClientRect();
  ball.style.left = (fieldRect.left + x * fieldRect.width) + 'px';
  ball.style.top = (fieldRect.top + (1 - y) * fieldRect.height) + 'px';

  // Text: bright white in sleep (dark bg), dark in play (light bg)
  const textColor = lerpColor('#ffffff', '#1a1a2e', y);
  document.querySelectorAll('.corner-label').forEach(el => el.style.color = textColor);
  document.getElementById('app-logo').style.color = textColor;
  document.getElementById('version').style.color = textColor;
  document.querySelectorAll('#grid .line').forEach(el => el.style.color = textColor);
  const prompt = document.getElementById('start-prompt');
  if (prompt) prompt.style.color = textColor;

  // Color drift is handled by the glide loop

  // Labels: brighter in sleep, dimmer in play
  const baseLabelOpacity = lerp(0.35, 0.08, y);
  document.querySelectorAll('.corner-label').forEach(el => el.style.opacity = baseLabelOpacity);
  const nearest = x < 0.5 ? (y > 0.5 ? 'tl' : 'bl') : (y > 0.5 ? 'tr' : 'br');
  const dist = Math.sqrt(Math.pow(x < 0.5 ? x : 1 - x, 2) + Math.pow(y > 0.5 ? 1 - y : y, 2));
  document.getElementById('lbl-' + nearest).style.opacity = baseLabelOpacity + (1 - dist) * 0.35;
}

// ─── INTERACTION ───
function initApp() {
  appReady = true;
  updateVisuals();

  const field = document.getElementById('field');
  const prompt = document.getElementById('start-prompt');

  function getXY(e) {
    const rect = field.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: Math.max(0, Math.min(1, (cx - rect.left) / rect.width)),
      y: Math.max(0, Math.min(1, 1 - (cy - rect.top) / rect.height))
    };
  }

  function onStart(e) {
    e.preventDefault();
    if (!audioStarted) {
      startAudio();
      audioStarted = true;
      prompt.style.display = 'none';
      document.getElementById('mute-btn').style.display = 'flex';
    }
    isDragging = true;
    onMove(e);
  }

  function onMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    const pos = getXY(e);
    xTarget = pos.x;
    yTarget = pos.y;
    // glideLoop handles the smooth transition
  }

  function onEnd() { isDragging = false; }

  field.addEventListener('mousedown', onStart);
  field.addEventListener('touchstart', onStart, { passive: false });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchend', onEnd);
}

// ═══════════════════════════════════════
// AUDIO ENGINE — ONE UNIFIED SEQUENCER
// ═══════════════════════════════════════
let musicBoxSynth, vocalSynth, bellSynth, padSynth, bassSynth;
let noiseSynth, kickSynth, hihatSynth, rimSynth;
let mainLoop; // single master loop runs everything
let masterReverb, masterDelay, masterFilter, masterComp, masterGain;
let noiseFilter;

// ─── SHARED MUSICAL STATE ───
let chordIndex = 0;
let barCount = 0;
let currentScale = [0, 2, 4, 7, 9]; // shared scale for melody+bass
let currentPadNotes = [60, 64, 67];  // current pad chord
let currentBassNote = 48;            // current bass root

// ─── CHORD PROGRESSIONS (all as { pad, bass, scale }) ───
const SING_PLAY = [
  { pad: [60, 64, 67], bass: 48, scale: [0, 2, 4, 7, 9] },     // C maj, C penta
  { pad: [65, 69, 72], bass: 53, scale: [0, 2, 4, 7, 9] },     // F maj, F penta
  { pad: [67, 71, 74], bass: 55, scale: [0, 2, 4, 7, 9] },     // G maj, G penta
  { pad: [57, 60, 64], bass: 45, scale: [0, 2, 4, 7, 9] },     // Am,   A min penta
];
const SING_SLEEP = [
  { pad: [57, 60, 64, 67], bass: 45, scale: [0, 3, 5, 7, 10] },   // Am7
  { pad: [60, 63, 67, 70], bass: 48, scale: [0, 3, 5, 7, 10] },   // Cm7
  { pad: [65, 68, 72, 75], bass: 53, scale: [0, 3, 5, 7, 10] },   // Fm7
  { pad: [58, 62, 65, 69], bass: 46, scale: [0, 2, 4, 7, 9] },    // Bbmaj7
];
const FLOAT_PLAY = [
  { pad: [60, 64, 67, 71], bass: 48, scale: [0, 2, 4, 6, 7, 9, 11] }, // Cmaj7, lydian
  { pad: [62, 66, 69, 73], bass: 50, scale: [0, 2, 4, 6, 7, 9, 11] }, // Dmaj7
  { pad: [64, 68, 71, 76], bass: 52, scale: [0, 2, 4, 6, 7, 9, 11] }, // Emaj7
  { pad: [67, 71, 74, 78], bass: 55, scale: [0, 2, 4, 6, 7, 9, 11] }, // Gmaj7
];
const FLOAT_SLEEP = [
  { pad: [48, 55, 60, 67], bass: 36, scale: [0, 2, 4, 7, 9] },  // open C
  { pad: [50, 57, 62, 69], bass: 38, scale: [0, 2, 4, 7, 9] },  // open D
  { pad: [53, 60, 65, 72], bass: 41, scale: [0, 2, 4, 7, 9] },  // open F
  { pad: [45, 52, 57, 64], bass: 33, scale: [0, 2, 4, 7, 9] },  // open A
];

function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }
function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
function lerp(a, b, t) { return a + (b - a) * t; }

function startAudio() {
  Tone.start();

  // ─── FX Chain ───
  masterReverb = new Tone.Reverb({ decay: 4, wet: 0.3 }).toDestination();
  masterDelay = new Tone.FeedbackDelay({ delayTime: '8n.', feedback: 0.15, wet: 0.1 }).connect(masterReverb);
  masterComp = new Tone.Compressor({ threshold: -18, ratio: 3, attack: 0.05, release: 0.2 }).connect(masterDelay);
  masterFilter = new Tone.Filter({ frequency: 5000, type: 'lowpass', rolloff: -12 }).connect(masterComp);
  masterGain = new Tone.Gain(0.6).connect(masterFilter);

  // ─── MELODY REVERB (dedicated send for melodic elements) ───
  const melodyReverb = new Tone.Reverb({ decay: 2.5, wet: 0.3 }).connect(masterGain);

  // ─── SYNTHS ───
  musicBoxSynth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'custom', partials: [1, 0.8, 0.4, 0.2, 0.1] },
    envelope: { attack: 0.002, decay: 0.5, sustain: 0.02, release: 1.2 },
    volume: -8,
  }).connect(melodyReverb);

  vocalSynth = new Tone.PolySynth(Tone.FMSynth, {
    harmonicity: 2.01, modulationIndex: 1.5,
    oscillator: { type: 'triangle' }, modulation: { type: 'sine' },
    envelope: { attack: 0.15, decay: 1.8, sustain: 0.4, release: 3 },
    modulationEnvelope: { attack: 0.3, decay: 0.8, sustain: 0.3, release: 2 },
    volume: -12,
  }).connect(melodyReverb);

  bellSynth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'sine' },
    envelope: { attack: 0.001, decay: 2.5, sustain: 0, release: 4 },
    volume: -16,
  }).connect(melodyReverb);

  padSynth = new Tone.PolySynth(Tone.FMSynth, {
    harmonicity: 1.005, modulationIndex: 0.5,
    oscillator: { type: 'sine' }, modulation: { type: 'triangle' },
    envelope: { attack: 4, decay: 3, sustain: 0.7, release: 6 },
    modulationEnvelope: { attack: 5, decay: 4, sustain: 0.5, release: 6 },
    volume: -18,
  }).connect(masterGain);

  bassSynth = new Tone.Synth({
    oscillator: { type: 'triangle' },
    envelope: { attack: 0.05, decay: 1.5, sustain: 0.3, release: 2 },
    volume: -16,
  }).connect(masterGain);

  kickSynth = new Tone.MembraneSynth({
    pitchDecay: 0.04, octaves: 3,
    envelope: { attack: 0.001, decay: 0.25, sustain: 0, release: 0.3 },
    volume: -18,
  }).connect(masterGain);

  hihatSynth = new Tone.MetalSynth({
    frequency: 300, envelope: { attack: 0.001, decay: 0.08, release: 0.02 },
    harmonicity: 5.1, modulationIndex: 20, resonance: 6000, octaves: 1.5,
    volume: -28,
  }).connect(masterGain);

  rimSynth = new Tone.NoiseSynth({
    noise: { type: 'white' },
    envelope: { attack: 0.001, decay: 0.04, sustain: 0, release: 0.02 },
    volume: -26,
  }).connect(new Tone.Filter({ frequency: 3000, type: 'bandpass' }).connect(masterGain));

  noiseFilter = new Tone.Filter({ frequency: 600, type: 'lowpass' }).connect(masterGain);
  noiseSynth = new Tone.Noise({ type: 'pink', volume: -34 }).connect(noiseFilter);
  noiseSynth.start();

  // ─── CHOOSE CHORD SET BASED ON POSITION ───
  function getProgression() {
    const x = xVal, y = yVal;
    if (x < 0.5 && y >= 0.5) return SING_PLAY;
    if (x < 0.5 && y < 0.5) return SING_SLEEP;
    if (x >= 0.5 && y >= 0.5) return FLOAT_PLAY;
    return FLOAT_SLEEP;
  }

  function advanceChord(time) {
    const prog = getProgression();
    chordIndex = (chordIndex + 1) % prog.length;
    const ch = prog[chordIndex];

    // Update shared state — EVERYTHING reads from these
    currentScale = ch.scale;
    currentPadNotes = ch.pad;
    currentBassNote = ch.bass;

    // Play pad
    padSynth.releaseAll();
    const x = xVal, y = yVal;
    const padVol = lerp(0.2, 0.5, x * 0.5 + (1 - y) * 0.5);
    padSynth.triggerAttack(ch.pad.map(midiToFreq), time, padVol);

    // Play bass — same root, same time
    bassSynth.triggerRelease(time);
    const bassVol = lerp(0.2, 0.5, lerp(1, 0.3, y));
    bassSynth.triggerAttackRelease(midiToFreq(ch.bass), '1n', time, bassVol);
  }

  // ─── SINGLE MASTER LOOP — 16th note resolution ───
  let step = 0; // counts 16th notes
  let lastMelNote = -1;
  const STEPS_PER_BAR = 16; // 16 sixteenths = 1 bar of 4/4
  const BARS_PER_CHORD = 2; // chord changes every 2 bars

  mainLoop = new Tone.Loop(time => {
    const x = xVal, y = yVal;
    const beatInBar = step % STEPS_PER_BAR;       // 0-15
    const barInChord = Math.floor((step % (STEPS_PER_BAR * BARS_PER_CHORD)) / STEPS_PER_BAR);

    // ═══ CHORD CHANGE on beat 0 of every 2 bars ═══
    if (beatInBar === 0 && barInChord === 0) {
      advanceChord(time);
    }

    // ═══ Crossfade amounts ═══
    const singAmt = Math.max(0, 1 - x * 2);
    const floatAmt = Math.max(0, x * 2 - 1);
    const energy = Math.max(0, (y - 0.15) / 0.85); // 0=sleep, 1=play

    // ═══ KICK (on the grid, same clock) ═══
    if (energy > 0.1) {
      const kickVol = lerp(0.15, 0.5, energy) * lerp(1.0, 0.4, x);
      if (beatInBar === 0 ||
          (beatInBar === 8 && energy > 0.3) ||
          (beatInBar === 6 && energy > 0.7)) {
        kickSynth.triggerAttackRelease(lerp(52, 62, y), '16n', time, kickVol);
      }
    }

    // ═══ HIHAT (8ths and 16ths, same grid) ═══
    if (energy > 0.15) {
      const isEighth = beatInBar % 2 === 0;
      const hhProb = isEighth ? energy * 0.8 : energy * 0.3;
      if (Math.random() < hhProb) {
        const accent = beatInBar % 4 === 0 ? 1.2 : (isEighth ? 0.8 : 0.45);
        hihatSynth.triggerAttackRelease('32n', time, lerp(0.04, 0.18, energy) * accent * lerp(1, 0.3, x));
      }
    }

    // ═══ RIM ghost notes ═══
    if (energy > 0.4 && (beatInBar === 3 || beatInBar === 7 || beatInBar === 11)) {
      if (Math.random() < energy * 0.4 * lerp(1, 0.2, x)) {
        rimSynth.triggerAttackRelease('32n', time, lerp(0.08, 0.25, energy));
      }
    }

    // ═══ BASS re-trigger on certain beats (rhythmic bass in play) ═══
    if (energy > 0.4 && singAmt > 0.3 && beatInBar === 8) {
      bassSynth.triggerAttackRelease(midiToFreq(currentBassNote), '4n', time, 0.25 * energy);
    }

    // ═══ MELODY (on 8th note grid = every 2 steps) ═══
    const isEighth = beatInBar % 2 === 0;
    if (isEighth) {
      const eighth = beatInBar / 2; // 0-7

      // ── Sing+Play: music box, chord-locked, rhythmic ──
      if (singAmt > 0 && y > 0.3) {
        const playAmt = (y - 0.3) / 0.7;
        // Rhythmic probability grid for melody
        let prob;
        if (eighth === 0) prob = 0.95;
        else if (eighth === 4) prob = 0.8;
        else if (eighth === 2 || eighth === 6) prob = 0.55;
        else prob = 0.15 * playAmt;
        prob *= singAmt * lerp(0.5, 1.0, playAmt);

        if (Math.random() < prob) {
          // Pick from SHARED scale, rooted to current chord
          const root = currentPadNotes[0]; // chord root
          const scaleNote = pick(currentScale);
          const octave = Math.round(lerp(60, 72, playAmt));
          let note = octave + scaleNote;

          // Stepwise: prefer close to last note
          if (lastMelNote > 0 && Math.abs(note - lastMelNote) > 5 && Math.random() > 0.35) {
            const options = currentScale.map(s => octave + s)
              .sort((a, b) => Math.abs(a - lastMelNote) - Math.abs(b - lastMelNote));
            note = options[0];
          }

          const vel = lerp(0.25, 0.5, playAmt) * singAmt;
          const dur = eighth === 0 ? '8n' : '16n';
          musicBoxSynth.triggerAttackRelease(midiToFreq(note), dur, time, vel);

          // Harmony on downbeats
          if (eighth === 0 && Math.random() > 0.5 && playAmt > 0.5) {
            const h = note + pick(currentScale.filter(s => s > 2));
            musicBoxSynth.triggerAttackRelease(midiToFreq(h), '16n', time + 0.03, vel * 0.3);
          }
          lastMelNote = note;
        }
      }

      // ── Sing+Sleep: vocal, sparse ──
      if (singAmt > 0 && y < 0.65) {
        const sleepAmt = Math.max(0, (0.65 - y) / 0.65);
        const prob = (eighth === 0 ? 0.5 : (eighth === 4 ? 0.25 : 0.05)) * sleepAmt * singAmt;

        if (Math.random() < prob) {
          const root = currentPadNotes[0];
          const note = lerp(55, 64, 1 - sleepAmt) + pick(currentScale);
          const vel = lerp(0.1, 0.3, sleepAmt) * singAmt;
          vocalSynth.triggerAttackRelease(midiToFreq(Math.round(note)), lerp(0.8, 2.5, sleepAmt), time, vel);
          lastMelNote = Math.round(note);
        }
      }

      // ── Float: shimmer bells, uses same scale ──
      if (floatAmt > 0) {
        const prob = lerp(0.05, 0.35, floatAmt) * lerp(0.5, 1.0, 1 - y * 0.3);
        if (Math.random() < prob) {
          const note = lerp(78, 90, x) + pick(currentScale);
          const vel = lerp(0.06, 0.2, floatAmt);
          bellSynth.triggerAttackRelease(midiToFreq(Math.round(note)), 0.02, time, vel);
        }
      }
    }

    // ═══ SUB PULSE (sleep side, on half notes) ═══
    if (y < 0.4 && beatInBar === 0 && Math.random() < (0.4 - y)) {
      bassSynth.triggerAttackRelease(midiToFreq(currentBassNote), '2n', time, lerp(0.1, 0.3, 1 - y));
    }

    step++;
  }, '16n');

  // ─── START ───
  Tone.getTransport().bpm.value = 100;
  Tone.getTransport().start();
  mainLoop.start(0);
  updateAudio();
}

function updateAudio() {
  if (!audioStarted) return;
  const x = xVal, y = yVal;

  // BPM: sleep=55, play=115; float slows slightly
  Tone.getTransport().bpm.rampTo(lerp(55, 115, y) * lerp(1.0, 0.85, x), 2);

  // Reverb
  const revWet = lerp(0.12, 0.55, x) + lerp(0.2, 0, y);
  masterReverb.wet.rampTo(Math.min(revWet, 0.7), 2);
  masterReverb.decay = lerp(2, 10, x * 0.6 + (1 - y) * 0.4);

  // Delay
  masterDelay.wet.rampTo(lerp(0.03, 0.28, x), 1.5);
  masterDelay.feedback.rampTo(lerp(0.08, 0.38, x), 1.5);

  // Filter
  masterFilter.frequency.rampTo(lerp(700, 9000, y) * lerp(1.0, 0.75, x), 1);

  // Volume mix
  musicBoxSynth.volume.rampTo(lerp(-6, -24, x) + lerp(-6, 4, y), 1);
  vocalSynth.volume.rampTo(lerp(-8, -28, x) + lerp(3, -5, y), 1);
  bellSynth.volume.rampTo(lerp(-26, -10, x), 1);
  padSynth.volume.rampTo(lerp(-22, -10, x * 0.5 + (1 - y) * 0.5), 2);
  bassSynth.volume.rampTo(lerp(-12, -20, y) + lerp(2, -2, 1 - x), 2);
  kickSynth.volume.rampTo(lerp(-14, -26, x) + lerp(-10, 2, y), 1);
  hihatSynth.volume.rampTo(lerp(-24, -36, x) + lerp(-8, 2, y), 1);
  rimSynth.volume.rampTo(lerp(-22, -34, x) + lerp(-6, 2, y), 1);
  // Noise: subtle everywhere, only gently present in float+sleep
  const noiseVol = -60 + (1 - y) * 6 + x * 6 + ((1 - y) * x) * 6;
  noiseSynth.volume.rampTo(noiseVol, 2);
  noiseFilter.frequency.rampTo(lerp(400, 900, x), 2);
}

// ─── MUTE TOGGLE ───
let isMuted = false;
document.getElementById('mute-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  isMuted = !isMuted;
  const btn = document.getElementById('mute-btn');
  if (isMuted) {
    masterGain.gain.rampTo(0, 0.5);
    btn.textContent = 'unmute';
  } else {
    masterGain.gain.rampTo(0.6, 0.5);
    btn.textContent = 'mute';
  }
});

</script>

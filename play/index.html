<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>lil.audio</title>
  <script src="https://cdn.jsdelivr.net/npm/tone@15.1.22/build/Tone.min.js"></script>
  <style>
    @font-face {
      font-family: 'ComicSans';
      src: url('../fonts/comic-sans-bold.woff2') format('woff2');
      font-weight: bold;
      font-style: normal;
      font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'ComicSans', 'Comic Sans MS', cursive;
      overflow: hidden;
      touch-action: none;
      transition: background-color 1.5s ease;
      background-color: #1a1a2e;
    }

    /* ─── Password ─── */
    #gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    #gate .logo { font-size: 60px; font-weight: bold; color: #fff; }
    #gate input {
      font-family: 'ComicSans', 'Comic Sans MS', cursive;
      font-size: 20px;
      padding: 12px 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      text-align: center;
      outline: none;
      background: transparent;
      color: #fff;
      letter-spacing: 0.1em;
    }
    #gate input::placeholder { color: rgba(255,255,255,0.2); }
    #gate .hint { font-size: 14px; opacity: 0.2; color: #fff; }
    #gate.wrong input { border-color: #FF3B30; animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* ─── Main App ─── */
    #app {
      display: none;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      position: relative;
    }

    /* ─── XY Field ─── */
    #field {
      position: absolute;
      inset: 0;
      cursor: crosshair;
    }

    /* Corner labels */
    .corner-label {
      position: absolute;
      font-size: clamp(11px, 2.5vw, 16px);
      font-weight: bold;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.15;
      transition: opacity 0.8s, color 1.5s;
      pointer-events: none;
    }
    .corner-label.tl { top: 5vh; left: 5vw; }
    .corner-label.tr { top: 5vh; right: 5vw; text-align: right; }
    .corner-label.bl { bottom: 5vh; left: 5vw; }
    .corner-label.br { bottom: 5vh; right: 5vw; text-align: right; }

    /* The ball/cursor */
    #ball {
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-shadow: 0 0 30px rgba(255,255,255,0.15);
      transition: background-color 0.8s ease, box-shadow 0.8s ease;
      z-index: 10;
    }

    /* Glow trail */
    #ball::after {
      content: '';
      position: absolute;
      inset: -15px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Logo */
    #app-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(60px, 15vw, 120px);
      font-weight: bold;
      opacity: 0.06;
      pointer-events: none;
      z-index: 1;
      transition: color 1.5s;
    }

    /* Start prompt */
    #start-prompt {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(16px, 3.5vw, 24px);
      font-weight: bold;
      opacity: 0.5;
      animation: pulse 2s ease-in-out infinite;
      cursor: pointer;
      z-index: 20;
      transition: color 1.5s;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.5; }
      50% { opacity: 0.15; }
    }

    /* Grid lines */
    #grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    #grid .line {
      position: absolute;
      background: currentColor;
      opacity: 0.04;
    }
    #grid .h { left: 0; right: 0; height: 1px; top: 50%; }
    #grid .v { top: 0; bottom: 0; width: 1px; left: 50%; }

    /* Version */
    #version {
      position: absolute;
      bottom: 2vh;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      opacity: 0.1;
      pointer-events: none;
      transition: color 1.5s;
    }
  </style>
</head>
<body>

  <div id="gate">
    <div class="logo">lil</div>
    <input id="pw" type="password" placeholder="•••••••" autofocus>
    <div class="hint">v0.1</div>
  </div>

  <div id="app">
    <div id="grid">
      <div class="line h"></div>
      <div class="line v"></div>
    </div>

    <div id="app-logo">lil</div>

    <div class="corner-label tl" id="lbl-tl">sing · play</div>
    <div class="corner-label tr" id="lbl-tr">float · play</div>
    <div class="corner-label bl" id="lbl-bl">sing · sleep</div>
    <div class="corner-label br" id="lbl-br">float · sleep</div>

    <div id="field">
      <div id="start-prompt">tap anywhere</div>
    </div>

    <div id="ball"></div>
    <div id="version">lil.audio v0.1</div>
  </div>

<script>
// ─── PASSWORD ───
const PASS = 'bambient';
const pwInput = document.getElementById('pw');
const gate = document.getElementById('gate');
const appEl = document.getElementById('app');

pwInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (pwInput.value === PASS) {
      gate.style.display = 'none';
      appEl.style.display = 'block';
      initApp();
    } else {
      gate.classList.add('wrong');
      pwInput.value = '';
      setTimeout(() => gate.classList.remove('wrong'), 400);
    }
  }
});

// ─── STATE ───
// x: 0 = melodic, 1 = ambient
// y: 0 = sleep (bottom), 1 = play (top)
let xVal = 0.5;
let yVal = 0.5;
let audioStarted = false;
let isDragging = false;

// ─── COLORS ───
function lerpColor(a, b, t) {
  const ah = parseInt(a.replace('#',''), 16);
  const bh = parseInt(b.replace('#',''), 16);
  const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
  const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
  return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
}

// Corner colors: TL(melodic+play) TR(ambient+play) BL(melodic+sleep) BR(ambient+sleep)
const C_TL = '#FFD60A'; // warm yellow
const C_TR = '#4ECDC4'; // teal
const C_BL = '#FF6B6B'; // coral
const C_BR = '#5E5CE6'; // deep purple

function bilinear(tl, tr, bl, br, x, y) {
  // x: 0=left, 1=right. y: 0=bottom, 1=top
  const top = lerpColor(tl, tr, x);
  const bot = lerpColor(bl, br, x);
  return lerpColor(bot, top, y);
}

function bilinearHex(tl, tr, bl, br, x, y) {
  const parse = c => {
    const h = parseInt(c.replace('#',''), 16);
    return [(h >> 16) & 0xff, (h >> 8) & 0xff, h & 0xff];
  };
  const lerp3 = (a, b, t) => a.map((v, i) => Math.round(v + (b[i] - v) * t));
  const top = lerp3(parse(tl), parse(tr), x);
  const bot = lerp3(parse(bl), parse(br), x);
  const c = lerp3(bot, top, y);
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

function updateVisuals() {
  const x = xVal, y = yVal;

  // Background: gets darker toward sleep, lighter toward play
  const bgSleep = bilinearHex('#080810', '#060a14', '#080810', '#060a14', x, 0);
  const bgPlay = bilinearHex('#FFF8E0', '#E8F8F8', '#FFF8E0', '#E8F8F8', x, 0);
  document.body.style.backgroundColor = lerpColor(bgSleep, bgPlay, y);

  // Ball color
  const ballColor = bilinearHex(C_TL, C_TR, C_BL, C_BR, x, y);
  const ball = document.getElementById('ball');
  ball.style.backgroundColor = ballColor;
  ball.style.boxShadow = `0 0 ${20 + (1 - y) * 40}px ${ballColor}77`;

  // Position ball
  const fieldRect = document.getElementById('field').getBoundingClientRect();
  ball.style.left = (fieldRect.left + x * fieldRect.width) + 'px';
  ball.style.top = (fieldRect.top + (1 - y) * fieldRect.height) + 'px';

  // Text: bright white in sleep (dark bg), dark in play (light bg)
  const textColor = lerpColor('#ffffff', '#1a1a2e', y);
  document.querySelectorAll('.corner-label').forEach(el => el.style.color = textColor);
  document.getElementById('app-logo').style.color = textColor;
  document.getElementById('version').style.color = textColor;
  document.querySelectorAll('#grid .line').forEach(el => el.style.color = textColor);
  const prompt = document.getElementById('start-prompt');
  if (prompt) prompt.style.color = textColor;

  // Labels: brighter in sleep, dimmer in play
  const baseLabelOpacity = lerp(0.35, 0.08, y);
  document.querySelectorAll('.corner-label').forEach(el => el.style.opacity = baseLabelOpacity);
  const nearest = x < 0.5 ? (y > 0.5 ? 'tl' : 'bl') : (y > 0.5 ? 'tr' : 'br');
  const dist = Math.sqrt(Math.pow(x < 0.5 ? x : 1 - x, 2) + Math.pow(y > 0.5 ? 1 - y : y, 2));
  document.getElementById('lbl-' + nearest).style.opacity = baseLabelOpacity + (1 - dist) * 0.35;
}

// ─── INTERACTION ───
function initApp() {
  updateVisuals();

  const field = document.getElementById('field');
  const prompt = document.getElementById('start-prompt');

  function getXY(e) {
    const rect = field.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: Math.max(0, Math.min(1, (cx - rect.left) / rect.width)),
      y: Math.max(0, Math.min(1, 1 - (cy - rect.top) / rect.height))
    };
  }

  function onStart(e) {
    e.preventDefault();
    if (!audioStarted) {
      startAudio();
      audioStarted = true;
      prompt.style.display = 'none';
    }
    isDragging = true;
    onMove(e);
  }

  function onMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    const pos = getXY(e);
    xVal = pos.x;
    yVal = pos.y;
    updateVisuals();
    updateAudio();
  }

  function onEnd() { isDragging = false; }

  field.addEventListener('mousedown', onStart);
  field.addEventListener('touchstart', onStart, { passive: false });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchend', onEnd);
}

// ─── AUDIO ENGINE ───
// SYNTHS — two melody voices that crossfade based on X
let musicBoxSynth, vocalSynth, bellSynth, padSynth, bassSynth;
let noiseSynth, kickSynth, hihatSynth, rimSynth;
let melodyLoop, bellLoop, rhythmLoop, subLoop, driftTimeout;
let masterReverb, masterDelay, masterFilter, masterComp, masterGain;
let noiseFilter;
let currentChordIndex = 0;

const PENTATONIC = [0, 2, 4, 7, 9];
const LYDIAN = [0, 2, 4, 6, 7, 9, 11]; // dreamy bright
const DORIAN = [0, 2, 3, 5, 7, 9, 10]; // warm minor

// sing+play: bright major. sing+sleep: tender minor
// float+play: lydian shimmer. float+sleep: deep space
const SING_PLAY_CHORDS = [
  [60, 64, 67],    // C
  [65, 69, 72],    // F
  [67, 71, 74],    // G
  [60, 64, 69],    // C add9
];
const SING_SLEEP_CHORDS = [
  [57, 60, 64, 67], // Am7
  [60, 63, 67, 70], // Cm7
  [65, 68, 72, 75], // Fm7
  [58, 62, 65, 69], // Bbmaj7
];
const FLOAT_PLAY_CHORDS = [
  [60, 64, 67, 71], // Cmaj7
  [62, 66, 69, 73], // Dmaj7
  [64, 68, 71, 76], // Emaj7
  [67, 71, 74, 78], // Gmaj7
];
const FLOAT_SLEEP_CHORDS = [
  [48, 55, 60, 67], // open 5ths stack
  [50, 57, 62, 69], // D open
  [53, 60, 65, 72], // F open
  [45, 52, 57, 64], // A open low
];

function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }
function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
function lerp(a, b, t) { return a + (b - a) * t; }

function startAudio() {
  Tone.start();

  // ─── FX Chain ───
  masterReverb = new Tone.Reverb({ decay: 4, wet: 0.3 }).toDestination();
  masterDelay = new Tone.FeedbackDelay({ delayTime: '8n.', feedback: 0.15, wet: 0.1 }).connect(masterReverb);
  masterComp = new Tone.Compressor({ threshold: -20, ratio: 3, attack: 0.1, release: 0.3 }).connect(masterDelay);
  masterFilter = new Tone.Filter({ frequency: 5000, type: 'lowpass', rolloff: -12 }).connect(masterComp);
  masterGain = new Tone.Gain(0.6).connect(masterFilter);

  // ─── MUSIC BOX SYNTH (sing side — xylophone/kalimba, snappy) ───
  musicBoxSynth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'custom', partials: [1, 0.8, 0.4, 0.2, 0.1, 0.05] },
    envelope: { attack: 0.002, decay: 0.6, sustain: 0.02, release: 1.5 },
    volume: -8,
  }).connect(masterGain);

  // ─── VOCAL SYNTH (sing+sleep side — breathy, vocal, warm) ───
  // Simulate vocal timbre with FM + filtered triangle
  vocalSynth = new Tone.PolySynth(Tone.FMSynth, {
    harmonicity: 2.01,
    modulationIndex: 1.5,
    oscillator: { type: 'triangle' },
    modulation: { type: 'sine' },
    envelope: { attack: 0.15, decay: 1.8, sustain: 0.4, release: 3 },
    modulationEnvelope: { attack: 0.3, decay: 0.8, sustain: 0.3, release: 2 },
    volume: -12,
  }).connect(masterGain);

  // ─── BELL / CHIME (float side — crystalline) ───
  bellSynth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'sine' },
    envelope: { attack: 0.001, decay: 2.5, sustain: 0, release: 4 },
    volume: -16,
  }).connect(masterGain);

  // ─── PAD (drones — all corners but different voicings) ───
  padSynth = new Tone.PolySynth(Tone.FMSynth, {
    harmonicity: 1.005, // slight detune for width
    modulationIndex: 0.5,
    oscillator: { type: 'sine' },
    modulation: { type: 'triangle' },
    envelope: { attack: 4, decay: 3, sustain: 0.7, release: 6 },
    modulationEnvelope: { attack: 5, decay: 4, sustain: 0.5, release: 6 },
    volume: -18,
  }).connect(masterGain);

  // ─── BASS (sub + warmth) ───
  bassSynth = new Tone.Synth({
    oscillator: { type: 'triangle' },
    envelope: { attack: 0.6, decay: 2, sustain: 0.4, release: 4 },
    volume: -20,
  }).connect(masterGain);

  // ─── KICK (soft thump — play side) ───
  kickSynth = new Tone.MembraneSynth({
    pitchDecay: 0.04,
    octaves: 3,
    envelope: { attack: 0.001, decay: 0.25, sustain: 0, release: 0.3 },
    volume: -18,
  }).connect(masterGain);

  // ─── HIHAT (texture tick — play side) ───
  hihatSynth = new Tone.MetalSynth({
    frequency: 300,
    envelope: { attack: 0.001, decay: 0.08, release: 0.02 },
    harmonicity: 5.1,
    modulationIndex: 20,
    resonance: 6000,
    octaves: 1.5,
    volume: -28,
  }).connect(masterGain);

  // ─── RIM/CLICK (ghost notes) ───
  rimSynth = new Tone.NoiseSynth({
    noise: { type: 'white' },
    envelope: { attack: 0.001, decay: 0.04, sustain: 0, release: 0.02 },
    volume: -26,
  }).connect(new Tone.Filter({ frequency: 3000, type: 'bandpass' }).connect(masterGain));

  // ─── NOISE / TEXTURE ───
  noiseFilter = new Tone.Filter({ frequency: 600, type: 'lowpass' }).connect(masterGain);
  noiseSynth = new Tone.Noise({ type: 'pink', volume: -34 }).connect(noiseFilter);
  noiseSynth.start();

  // ─── MELODY SEQUENCER ───
  let lastNote = -1;
  let stepInPhrase = 0;

  melodyLoop = new Tone.Loop(time => {
    const x = xVal, y = yVal;
    stepInPhrase++;

    // Probability: sing side = dense, float side = sparse
    const noteProb = lerp(0.85, 0.12, x) * lerp(0.35, 1.0, y * 0.7 + 0.3);
    if (Math.random() > noteProb) return;

    // Scale: sing=pentatonic (play) or dorian (sleep). float=lydian (play) or wide pentatonic (sleep)
    let scale;
    if (x < 0.5) {
      scale = y > 0.4 ? PENTATONIC : DORIAN;
    } else {
      scale = y > 0.4 ? LYDIAN : PENTATONIC;
    }

    // Register
    const baseNote = Math.round(lerp(58, 74, y) + (Math.random() - 0.5) * lerp(5, 16, x));
    const interval = pick(scale);
    const note = baseNote + interval;
    if (note === lastNote && Math.random() > 0.25) return;
    lastNote = note;

    const freq = midiToFreq(note);

    // ─── TIMBRE CROSSFADE via X ───
    // x=0 (sing): music box in play, vocal in sleep
    // x=1 (float): bells and shimmer

    const singAmount = Math.max(0, 1 - x * 2);    // 1 at x=0, 0 at x>=0.5
    const floatAmount = Math.max(0, x * 2 - 1);    // 0 at x<=0.5, 1 at x=1
    const midAmount = 1 - singAmount - floatAmount; // blend zone

    // Music box: sing+play corner
    if (singAmount > 0 && y > 0.3) {
      const vel = lerp(0.2, 0.55, y) * singAmount;
      musicBoxSynth.triggerAttackRelease(freq, lerp(0.15, 0.05, y), time, vel);
      // Double-strike ornament
      if (Math.random() > 0.65 && y > 0.5) {
        const harm = midiToFreq(note + pick([12, 7]));
        musicBoxSynth.triggerAttackRelease(harm, 0.03, time + 0.04, vel * 0.35);
      }
    }

    // Vocal: sing+sleep corner
    if (singAmount > 0 && y < 0.7) {
      const sleepiness = 1 - y;
      const vel = lerp(0.1, 0.35, sleepiness) * singAmount;
      vocalSynth.triggerAttackRelease(freq, lerp(0.5, 2.0, sleepiness), time, vel);
    }

    // Mid zone: mix of both
    if (midAmount > 0) {
      const vel = lerp(0.15, 0.4, y) * midAmount;
      if (y > 0.5) {
        musicBoxSynth.triggerAttackRelease(freq, 0.1, time, vel);
      } else {
        vocalSynth.triggerAttackRelease(freq, 1.0, time, vel * 0.7);
      }
    }

    // Float side: rare melodic touches through bells
    if (floatAmount > 0 && Math.random() > 0.5) {
      const vel = lerp(0.1, 0.25, floatAmount);
      bellSynth.triggerAttackRelease(midiToFreq(note + 12), 0.02, time, vel);
    }
  }, '8n');

  // ─── BELL / CHIME LOOP (float side shimmer) ───
  bellLoop = new Tone.Loop(time => {
    const x = xVal, y = yVal;
    const floatness = Math.max(0, (x - 0.3) / 0.7);
    if (floatness < 0.05) return;

    const prob = lerp(0.1, 0.5, floatness);
    if (Math.random() > prob) return;

    const scale = y > 0.5 ? LYDIAN : PENTATONIC;
    const interval = pick(scale);
    const base = lerp(80, 92, x) + Math.floor(Math.random() * 8);
    const freq = midiToFreq(base + interval);
    const vel = lerp(0.06, 0.2, floatness) * lerp(0.6, 1.0, 1 - y * 0.3);
    bellSynth.triggerAttackRelease(freq, 0.02, time, vel);
  }, '4n');

  // ─── RHYTHM (play side — builds complexity toward top) ───
  let rStep = 0;
  const swingAmount = 0.02;

  rhythmLoop = new Tone.Loop(time => {
    const x = xVal, y = yVal;
    rStep++;

    // Energy level: 0 at bottom, 1 at top. Reduced on float side
    const energy = Math.max(0, (y - 0.15) / 0.85) * lerp(1.0, 0.4, x);
    if (energy < 0.03) return;

    const swing = (rStep % 2 === 1) ? swingAmount : 0;
    const beat = rStep % 16;
    const bar = beat % 4;

    // Kick: simple pattern, more hits with more energy
    if (beat === 0 || (beat === 8 && energy > 0.3) || (beat === 6 && energy > 0.7)) {
      kickSynth.triggerAttackRelease(lerp(50, 65, y), '16n', time + swing, lerp(0.2, 0.5, energy));
    }

    // Hihat: 8ths, then 16ths at higher energy
    const hhProb = beat % 2 === 0 ? energy * 0.8 : energy * 0.4;
    if (Math.random() < hhProb && energy > 0.15) {
      const accent = beat % 4 === 0 ? 1.2 : (beat % 2 === 0 ? 0.8 : 0.5);
      hihatSynth.triggerAttackRelease('16n', time + swing, lerp(0.05, 0.2, energy) * accent);
    }

    // Rim ghost notes: sparse syncopation
    if (energy > 0.4 && (beat === 3 || beat === 7 || beat === 11 || beat === 14)) {
      if (Math.random() < energy * 0.5) {
        rimSynth.triggerAttackRelease('32n', time + swing, lerp(0.1, 0.3, energy));
      }
    }
  }, '16n');

  // ─── SUB BASS PULSE (sleep side) ───
  subLoop = new Tone.Loop(time => {
    const x = xVal, y = yVal;
    const sleepiness = Math.max(0, (0.5 - y) / 0.5);
    if (sleepiness < 0.1) return;
    if (Math.random() > sleepiness * 0.6) return;

    // Gentle sub pulse
    const freq = midiToFreq(lerp(36, 43, Math.random()));
    bassSynth.triggerAttackRelease(freq, lerp(1, 4, sleepiness), time, lerp(0.1, 0.3, sleepiness));
  }, '2n');

  // ─── CHORD DRIFT ───
  function getChords() {
    const x = xVal, y = yVal;
    // Bilinear blend between 4 chord sets
    if (x < 0.5 && y > 0.5) return SING_PLAY_CHORDS;
    if (x < 0.5 && y <= 0.5) return SING_SLEEP_CHORDS;
    if (x >= 0.5 && y > 0.5) return FLOAT_PLAY_CHORDS;
    return FLOAT_SLEEP_CHORDS;
  }

  function playChord() {
    const x = xVal, y = yVal;
    const chords = getChords();
    currentChordIndex = (currentChordIndex + 1) % chords.length;
    if (Math.random() > 0.75) currentChordIndex = Math.floor(Math.random() * chords.length);

    const chord = chords[currentChordIndex];
    padSynth.releaseAll();

    // Pad voicing
    const padVol = lerp(0.2, 0.55, x * 0.5 + (1 - y) * 0.5);
    padSynth.triggerAttack(chord.map(midiToFreq), Tone.now(), padVol);

    // Bass root
    const bassVol = lerp(0.15, 0.45, 1 - y);
    bassSynth.triggerRelease();
    bassSynth.triggerAttack(midiToFreq(chord[0] - 12), Tone.now(), bassVol);
  }

  function scheduleChord() {
    const interval = lerp(6000, 3500, yVal) + lerp(0, 5000, xVal) + Math.random() * 3000;
    playChord();
    driftTimeout = setTimeout(scheduleChord, interval);
  }

  // ─── START ───
  Tone.getTransport().bpm.value = 90;
  Tone.getTransport().start();
  melodyLoop.start(0);
  bellLoop.start(0);
  rhythmLoop.start(0);
  subLoop.start(0);
  scheduleChord();
  updateAudio();
}

function updateAudio() {
  if (!audioStarted) return;
  const x = xVal, y = yVal;

  // BPM: sleep=52, play=118; float slows slightly
  Tone.getTransport().bpm.rampTo(lerp(52, 118, y) * lerp(1.0, 0.85, x), 2);

  // Reverb: huge in float+sleep, tight in sing+play
  const revWet = lerp(0.12, 0.55, x) + lerp(0.25, 0, y);
  masterReverb.wet.rampTo(Math.min(revWet, 0.75), 2);
  masterReverb.decay = lerp(2, 10, x * 0.6 + (1 - y) * 0.4);

  // Delay: shimmer in float, minimal in sing
  masterDelay.wet.rampTo(lerp(0.03, 0.3, x), 1.5);
  masterDelay.feedback.rampTo(lerp(0.08, 0.4, x), 1.5);

  // Filter: bright top, dark bottom; float slightly warmer
  const freq = lerp(600, 9000, y) * lerp(1.0, 0.75, x);
  masterFilter.frequency.rampTo(freq, 1);

  // Music box: loud in sing+play, fades elsewhere
  musicBoxSynth.volume.rampTo(lerp(-6, -22, x) + lerp(-6, 4, y), 1);

  // Vocal: present in sing+sleep, fades in play and float
  vocalSynth.volume.rampTo(lerp(-8, -25, x) + lerp(3, -4, y), 1);

  // Bells: float side
  bellSynth.volume.rampTo(lerp(-24, -10, x), 1);

  // Pad: everywhere but louder in float+sleep
  padSynth.volume.rampTo(lerp(-22, -10, x * 0.5 + (1 - y) * 0.5), 2);

  // Bass
  bassSynth.volume.rampTo(lerp(-24, -14, (1 - y)), 2);

  // Kick + hihat: play side, quieter on float
  kickSynth.volume.rampTo(lerp(-14, -24, x) + lerp(-10, 2, y), 1);
  hihatSynth.volume.rampTo(lerp(-24, -34, x) + lerp(-8, 2, y), 1);
  rimSynth.volume.rampTo(lerp(-22, -32, x) + lerp(-6, 2, y), 1);

  // Noise: comfort wash, more in sleep+float
  noiseSynth.volume.rampTo(-38 + (1 - y) * 8 + x * 5, 2);
  noiseFilter.frequency.rampTo(lerp(400, 900, x), 2);

  // Loop intervals: faster in play, slower in sleep
  melodyLoop.interval = y > 0.6 ? '8n' : (y > 0.3 ? '4n' : '2n');
  bellLoop.interval = y > 0.5 ? '4n' : '2n';
}

</script>
